server.port=8080
spring.application.name=pos-backend

spring.datasource.url=jdbc:postgresql://localhost:5432/pos_db
spring.datasource.username=pos_user
spring.datasource.password=pos_password
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=60000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=POS_SECRET_KEY_CHANGE_IN_PRODUCTION_MIN_256_BITS_LONG
app.jwt.expiration-ms=86400000

app.cors.allowed-origins=http://localhost:3000

logging.level.com.pos=INFO

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
