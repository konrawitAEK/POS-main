services:

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pos_db
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pos_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos_user -d pos_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend          # สร้าง image จาก source
    # image: YOUR_DOCKERHUB/pos-backend:latest   # หรือใช้ image จาก Docker Hub
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pos_db
      SPRING_DATASOURCE_USERNAME: pos_user
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-pos_password}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      APP_JWT_SECRET: ${JWT_SECRET:-POS_SECRET_KEY_CHANGE_IN_PRODUCTION_MIN_256_BITS}
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./front-end
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8080}
    # image: YOUR_DOCKERHUB/pos-frontend:latest   # หรือใช้ image จาก Docker Hub
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
